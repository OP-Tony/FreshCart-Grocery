services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: grocery_store
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-docker-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_MODE: mysql
      MYSQL_DATABASE: grocery_store
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data:

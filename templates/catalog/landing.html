<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FreshCart Grocery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1f8a5b;
            --primary-dark: #156342;
            --bg-gradient: linear-gradient(135deg, #f5fbf7 0%, #e8f5ed 100%);
            --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: var(--font-sans);
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 480px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            color: #111e16;
            margin-bottom: 2rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #111e16 0%, #1f8a5b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* The Cart Section */
        .cart-wrapper {
            position: relative;
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .cart-logo {
            width: 140px;
            height: 140px;
            fill: none;
            stroke: var(--primary);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 8px 16px rgba(31, 138, 91, 0.15));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: float 4s ease-in-out infinite;
        }
        
        .cart-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
        
        /* Items inside the cart that will appear or drop */
        .cart-item-dot {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            width: 12px;
            height: 12px;
            opacity: 0;
            top: 20px;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* Animated button at the bottom of the cart */
        .btn-fill {
            margin-top: 1.5rem;
            padding: 16px 36px;
            font-family: var(--font-sans);
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            background-color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 8px 24px rgba(31, 138, 91, 0.25);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-fill:hover {
            transform: translateY(-3px);
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            box-shadow: 0 12px 30px rgba(21, 99, 66, 0.35);
        }
        
        .btn-fill:active {
            transform: translateY(-1px);
        }
        
        /* The requested clicked state: changes to white and text updates */
        .btn-fill.clicked {
            background-color: #ffffff !important;
            color: var(--primary) !important;
            border-color: #ffffff !important;
            box-shadow: 0 12px 32px rgba(31, 138, 91, 0.15);
            transform: scale(1.05);
        }
        
        /* Animation keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(1deg);
            }
        }
        
        @keyframes cartLaunch {
            0% {
                transform: scale(1) translateX(0);
            }
            30% {
                transform: scale(0.9) translateX(-15px);
            }
            100% {
                transform: scale(1.1) translateX(400px);
                opacity: 0;
            }
        }
        
        .launching .cart-logo {
            animation: cartLaunch 0.8s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="brand-name">FreshCart Grocery</h1>
        
        <div class="cart-wrapper" id="cart-container">
            <!-- Green SVG Cart Logo -->
            <svg class="cart-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- Cart basket -->
                <path class="cart-path" d="M3 3h2l.4 2M5.4 5h14.2l-1.5 9H6.1L4.3 4" stroke-width="2" />
                <path d="M6 14h12l.6 3H5.4L6 14z" fill="var(--primary)" opacity="0.1" stroke="none" />
                <!-- Wheels -->
                <circle cx="9" cy="20" r="2" stroke-width="2" />
                <circle cx="17" cy="20" r="2" stroke-width="2" />
            </svg>
            
            <!-- Items falling in animation dots -->
            <div class="cart-item-dot" style="left: 35%; top: -10px; transition-delay: 0.05s;"></div>
            <div class="cart-item-dot" style="left: 48%; top: -20px; transition-delay: 0.15s;"></div>
            <div class="cart-item-dot" style="left: 60%; top: -8px; transition-delay: 0.25s;"></div>
            
            <button class="btn-fill" id="action-btn">
                <span>Start Shopping</span>
            </button>
        </div>
    </div>

    <script>
        const actionBtn = document.getElementById('action-btn');
        const cartContainer = document.getElementById('cart-container');
        const dots = document.querySelectorAll('.cart-item-dot');
        
        actionBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Add clicked state to button (makes it white)
            actionBtn.classList.add('clicked');
            
            // Change button text to "Let's fill it"
            actionBtn.querySelector('span').innerText = "let's fill it";
            
            // Animate items dropping into the cart
            dots.forEach(dot => {
                dot.style.opacity = '1';
                dot.style.transform = 'scale(1) translateY(60px)';
            });
            
            // Animate cart launching away after a short delay
            setTimeout(() => {
                cartContainer.classList.add('launching');
            }, 600);
            
            // Redirect to products page
            setTimeout(() => {
                window.location.href = "{% url 'catalog:product_list' %}";
            }, 1350);
        });
    </script>
</body>
</html>
